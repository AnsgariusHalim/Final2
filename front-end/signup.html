<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup</title>
  <!-- Include Google Sign-In JavaScript library -->
  <script src="https://apis.google.com/js/platform.js" async defer></script>
  <!-- Set up Google Sign-In -->
  <meta name="google-signin-client_id" href="/auth/google">
  <!-- Link to CSS file -->
  <link rel="stylesheet" href="signup.css">
</head>

<body>
  <h1>Signup</h1>
  <!-- Success message placeholder -->
  <div id="success-message" style="display: none; color: green;">
    Signup successful! Redirecting to the homepage...
  </div>
  <!-- Google Sign-In button -->
  <div class="g-signin2" data-onsuccess="onSignIn" data-theme="dark"></div>
  <!-- Other signup form elements -->
  <form id="signup-form" action="/signup" method="POST">
    <input type="text" name="firstName" placeholder="First Name" required><br>
    <input type="text" name="lastName" placeholder="Last Name" required><br>
    <input type="text" name="username" placeholder="Username" required><br>
    <input type="email" name="email" placeholder="Email" required><br>
    <input type="password" name="password" placeholder="Password" required><br>
    <input type="password" name="confirmPassword" placeholder="Confirm Password" required><br>
    <button type="submit">Signup</button>
  </form>
  <a href="/">Back to Homepage</a>
  <a href="/auth/google">Sign Up with Google</a>

  <!-- JavaScript code for handling Google Sign-In -->
  <script>
    function onSignIn(googleUser) {
      var id_token = googleUser.getAuthResponse().id_token;
      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/google-signup');
      xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
      xhr.onload = function () {
        if (xhr.status === 200) {
          document.getElementById('success-message').style.display = 'block';
          setTimeout(function () {
            window.location.href = '/';
          }, 2000);
        } else {
          console.error('Error during signup: ' + xhr.responseText);
        }
      };
      xhr.send('idtoken=' + id_token);
    }

    // Handle manual form submission
    document.getElementById('signup-form').onsubmit = function (event) {
      event.preventDefault();
      var formData = new FormData(event.target);
      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/signup');
      xhr.onload = function () {
        if (xhr.status === 200) {
          document.getElementById('success-message').style.display = 'block';
          setTimeout(function () {
            window.location.href = '/';
          }, 2000);
        } else {
          console.error('Error during signup: ' + xhr.responseText);
        }
      };
      xhr.send(new URLSearchParams(formData).toString());
    };
  </script>
</body>

</html>

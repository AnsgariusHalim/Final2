<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>説故事</title>
    <link rel="stylesheet" href="register.css">
    <script src="registration.js" defer></script>
</head>

<body>
    <div class="Navigationbar">
        <a href="index.html"><img src="pictures/説故事.png" alt="Home"></a>
    </div>
    <div id="register">
        <div id="content">
            <h1>注冊</h1>
            <h3>熱烈歡迎新成員的加入</h3>

            <span class="space">
                <label for="surname"><b>用戶姓氏：</b></label>
                <input id="surname" type="text" required placeholder="請輸入姓氏" />
                <div class="warning" id="surname-warning"></div>
            </span>

            <br>

            <span class="space">
                <label for="firstname"><b>用戶姓名：</b></label>
                <input id="firstname" type="text" required placeholder="請輸入姓名" />
                <div class="warning" id="firstname-warning"></div>
            </span>

            <br>

            <span class="space">
                <label for="email"><b>電子郵件：</b></label>
                <input id="email" type="text" required placeholder="請輸入電子郵件" />
                <div class="warning" id="email-warning"></div>
            </span>

            <br>

            <span class="space">
                <label for="account"><b>賬戶名稱：</b></label>
                <input id="account" type="text" required placeholder="請輸入賬號名稱" />
                <div class="warning" id="account-warning"></div>
            </span>

            <br>

            <span class="space">
                <label for="password"><b>賬戶密碼：</b></label>
                <input id="password" type="password" required placeholder="請輸入賬號密碼" />
                <button type="button" onclick="togglePassword()">顯示/隱藏密碼</button>
                <div class="warning" id="password-warning"></div>
            </span>

            <br>

            <span class="space">
                <label for="cpassword"><b>密碼確認：</b></label>
                <input id="cpassword" type="password" required placeholder="請再次輸入賬號密碼" />
                <div class="warning" id="cpassword-warning"></div>
            </span>
        </div>

        <div id="uavatar">
            <img id="user" src="pictures/user.png" alt="User">
        </div>
    </div>
    <div class="black">
        <button id="registerBtn" type="button">完成</button>
    </div>
</body>

</html>

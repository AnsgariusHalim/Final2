<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>説故事</title>
    <link rel="stylesheet" href="login.css">
    <script src="login.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="Navigationbar">
        <a href="index.html"><img src="pictures/説故事.png" alt="Home"></a>
    </div>
    <div id="login-container">
        <div id="login">
            <h1>登入</h1>
            <input id="account" type="text" required placeholder="用戶名稱或電子郵件地址" />

            <div class="password-container">
                <input id="password" type="password" required placeholder="密碼" />
                <i class="far fa-eye" id="togglePassword"></i>
            </div>

            <button id="loginBtn" type="button">登入</button>
        </div>
        <!--<img id="user" src="pictures/user.png" alt="User">--> 
    </div>
</body>

</html>

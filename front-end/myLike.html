<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liked or Bookmarked Stories</title>
    <link rel="stylesheet" href="myLike.css">
</head>
<body>
    <div class="Navigationbar">
        <input type="checkbox" id="menuToggle">
        <label class="menu" for="menuToggle">
            <span></span>
            <span></span>
            <span></span>
            
            <ul class="sidebar" id="sidebar">
                <li><a href="#home">主頁</a></li>
                <li><a href="#tutorial">教學</a></li>
                <li><a href="#Portfolio">精彩作品集</a></li> 
                <li><a href="#aboutus">關於我們</a></li>
            </ul>
        </label>
        <a href="index.html"><img src="pictures\説故事.png"></a>

        <div class="userlist">
            <label for="userCheckbox">
                <input type="checkbox" id="userCheckbox" name="userButton">
                <img id="userAvatar" src="pictures/user_avatar.png" alt="User Avatar">
                

                <ul class="userSidebar" id="userSidebar">
                    <li><a href="#profile">個人檔案</a></li>
                    <li><a href="#mystory">我的故事</a></li>
                    <li><a href="#mysave">我的收藏</a></li>
                    <li><a href="#mylike">我的喜歡</a></li>
                    <li><a href="#setting">設定</a></li>
                    <li><a href="#logout">登出</a></li>
                </ul>
            </label>
            

        </div>
       
        <form action="getusername">
        <h3 id="username">用戶名稱</h3>
        </form>


    </div>
    <div class="sort-filter">
        <button id="sortNewest">從新到舊</button>
        <button id="sortOldest">從舊到新</button>
        <a id="selectModeToggle" href="#" class="select-mode-toggle">選取</a>
    </div>
    <div class="wrapper">
        <div id="storyList" class="story-grid"></div>
    </div>
    <div class="story-container">
        <div id="storyList" class="story-grid"></div>
    </div>
    <p id="noRecords" class="no-records" style="display: none;">No records found</p>
    <div id="selectionBar" class="selection-bar" style="display: none;">
        <span id="selectionCount">已選擇 0 個</span>
        <button id="deselectAll" class="deselect-all">收回讚</button>
    </div>

    <script src="myLike.js"></script>
</body>
</html>
